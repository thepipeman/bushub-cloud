spring:
  config:
    # not working with docker compose, so the config server is explicitly set here
    import: optional:configserver:http://localhost:9000/config

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9100/realms/bushub-cloud
          jwk-set-uri: http://localhost:9100/realms/bushub-cloud/protocol/openid-connect/certs

eureka:
  client:
    preferIpAddress: true
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://localhost:9001/eureka


resilience4j:
  circuitbreaker:
    customerTripByRef:
      registerHealthIndicator: true
      ringBufferSizeInClosedState: 5
      ringBufferSizeInHalfOpenState: 3
      waitDurationInOpenState: 10s
      failureRateThreshold: 50
      recordExceptions:
        - org.springframework.web.client.HttpServerErrorException
        - java.io.IOException
        - java.util.concurrent.TimeoutException
        - org.springframework.web.client.ResourceAccessException
  bulkhead:
    bulkheadCustomerTripByRef:
      maxWaitDuration: 10ms
      maxConcurrentCalls: 20
  retry:
    instances:
      retryCustomerTripByRef:
        max-attempts: 3
        waitDuration: 10000
        retry-exceptions:
          - java.util.concurrent.TimeoutException
#        max-attempts: 3
#        wait-duration: 10000
#        retry-exceptions:
#          - java.util.concurrent.TimeoutException

management:
  endpoints:
    enabled-by-default: false
  endpoint:
    health:
      enabled: true
      show-details: always

logging:
  level:
    org.springframework.web: DEBUG
    com.bushub: TRACE
    com.bushub.booking.customer.trip.CustomerBookingClient: TRACE

bushub:
  core:
    service-url: http://localhost:9003/api