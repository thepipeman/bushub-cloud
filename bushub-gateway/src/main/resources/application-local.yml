spring:
  config:
    # not working with docker compose, so the config server is explicitly set here
    import: optional:configserver:http://localhost:9000/config

  cloud:
    gateway:
#      discovery:
#        locator:
#          enabled: true
#          lower-case-service-id: true
      routes:
        - id: bushub-core
          uri: lb://bushub-core
          predicates:
            - Path=/core/**
          filters:
            - RewritePath=/core/(?<path>.*), /$\{path}
        - id: bushub-booking
          uri: lb://bushub-booking
          predicates:
            - Path=/booking/**
          filters:
            - RewritePath=/booking/(?<path>.*), /$\{path}


eureka:
  client:
    preferIpAddress: true
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://localhost:9001/eureka

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    gateway:
      enabled: true