version: '3.9'

services:
  bushub-config:
    image: bushub/bushub-config:0.0.1-SNAPSHOT
    container_name: bushub-config
    ports:
      - 9000:9000
    networks:
      backend:
        aliases:
          - "bushub-config"

  bushub-discovery:
    image: bushub/bushub-discovery:0.0.1-SNAPSHOT
    container_name: bushub-discovery
    depends_on:
      bushub-config:
        condition: service_started
    ports:
      - 9001:9001
    networks:
      backend:
        aliases:
          - "bushub-discovery"

  bushub-gateway:
    image: bushub/bushub-gateway:0.0.1-SNAPSHOT
    container_name: bushub-gateway
    depends_on:
      bushub-config:
        condition: service_started
      bushub-discovery:
        condition: service_started
    ports:
      - 9002:9002
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=optional:configserver:http://172.17.0.1:9000/config
    networks:
      backend:
        aliases:
          - "bushub-gateway"

  bushub-core:
    depends_on:
      bushub-config:
        condition: service_started
      bushub-discovery:
        condition: service_started
#    restart: on-failure
    image: bushub/bushub-core:0.0.1-SNAPSHOT
    container_name: bushub-core
    ports:
      - 9003:9003
    environment:
      - SPRING_PROFILES_ACTIVE=dev

#    networks:
#      - backend

  bushub-booking:
    depends_on:
      bushub-config:
        condition: service_started
      bushub-discovery:
        condition: service_started
#    restart: on-failure
    image: bushub/bushub-booking:0.0.1-SNAPSHOT
    container_name: bushub-booking
    ports:
      - 9004:9004
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=optional:configserver:http://172.17.0.1:9000/config

networks:
  backend:
    driver: bridge