spring:
  application:
    name: bushub-core

  # JPA
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Datasource settings
  datasource:
#    url: jdbc:postgresql://localhost:5432/bushub_core
    url: TEST
    username: root
    password: adminadmin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      pool-name: bhc-pool

  # Flyway settings
  flyway:
    enabled: true
    locations: classpath:schema
    validate-on-migrate: false
    mixed: true
    out-of-order: true
    table: schema_version

  config:
    import: configserver:http://localhost:9000/api

  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 20


#------------------------------------
# Server settings
#------------------------------------

server:
  port: 9001
  servlet:
    context-path: /api
